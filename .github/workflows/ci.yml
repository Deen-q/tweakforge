name: CI Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  # manual dispatch to test if pipes are running
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.11.0'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
      # commenting out linting for now since it's giving me a headache and isnt that important
      
      # clear next.js cache before linting
    # - name: Run ESLint
    #   run: |
    #     rm -rf .next
    #     npm run lint
    
    - name: Run tests
      run: npm run test
    
    - name: Build application
      run: npm run build

# test if Dockerfile *can* build successfully/prevent someone from breaking it
    - name: Create Docker Image
      run: docker build -t tweakforge .
